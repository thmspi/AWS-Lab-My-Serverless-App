<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dino — courez, sautez, recommencez.">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://cognito-idp.us-east-1.amazonaws.com https://*.execute-api.us-east-1.amazonaws.com; img-src 'self' data:; style-src 'self'; script-src 'self'; font-src 'self'; base-uri 'none'; form-action 'self'; object-src 'none'">
    <title>Dino</title>
    <script src="/config.js"></script>
    <script type="module" crossorigin src="/assets/index-DYL-l3Yl.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-wwwj3N0c.css">
  </head>
  <body>
    <main class="game-stage">
      <section class="game-shell" aria-label="Jeu Dino">
        <header class="game-header">
          <div class="wordmark" aria-label="Dino">dino<span aria-hidden="true">.</span></div>

          <div class="scores" aria-live="polite">
            <span><small>score</small><strong id="score">000000</strong></span>
            <span><small>record</small><strong id="local-best">000000</strong></span>
          </div>

          <nav class="quick-actions" aria-label="Options du joueur">
            <button id="leaderboard-button" class="icon-button" type="button" aria-label="Ouvrir le classement" title="Classement" hidden>
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M8 20v-7H4v7m12 0V4h4v16m-6 0V9h-4v11"/></svg>
            </button>
            <button id="account-button" class="icon-button" type="button" aria-label="Ouvrir le compte" title="Compte" hidden>
              <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4.5 21a7.5 7.5 0 0 1 15 0"/></svg>
            </button>
          </nav>
        </header>

        <div class="canvas-frame">
          <canvas id="game-canvas" width="900" height="360" aria-label="Jeu du dinosaure. Appuyez sur Espace ou flèche haut pour sauter."></canvas>
        </div>

        <footer class="game-footer">
          <button id="jump-button" class="jump-button" type="button">
            <span class="jump-icon" aria-hidden="true">↑</span>
            <span>Jouer</span>
          </button>
          <p id="game-message" class="status-message" aria-live="polite">Espace, flèche haut ou toucher pour sauter.</p>
          <span class="key-hint" aria-hidden="true"><kbd>espace</kbd> pour sauter</span>
        </footer>
      </section>
    </main>

    <dialog id="account-dialog" class="modal">
      <div class="modal-header">
        <div>
          <p class="overline">Joueur</p>
          <h2>Compte</h2>
        </div>
        <button class="close-button" type="button" data-close-dialog aria-label="Fermer">×</button>
      </div>

      <div class="session-row">
        <span id="auth-status" class="status-dot">Prêt</span>
        <span id="session-label">Mode visiteur</span>
        <button id="logout-button" class="text-button" type="button" hidden>Déconnexion</button>
      </div>

      <div id="auth-forms">
        <div class="tabs" role="tablist" aria-label="Actions de compte">
          <button class="tab is-active" type="button" role="tab" aria-selected="true" data-tab="login">Connexion</button>
          <button class="tab" type="button" role="tab" aria-selected="false" data-tab="register">Inscription</button>
          <button class="tab" type="button" role="tab" aria-selected="false" data-tab="confirm">Code</button>
        </div>

        <form id="login-form" class="auth-form" data-panel="login">
          <label>Nom d’utilisateur<input name="username" autocomplete="username" required></label>
          <label>Mot de passe<input name="password" type="password" autocomplete="current-password" required></label>
          <button class="primary-button" type="submit">Se connecter</button>
        </form>

        <form id="register-form" class="auth-form" data-panel="register" hidden>
          <label>Nom d’utilisateur<input name="username" minlength="3" maxlength="24" autocomplete="username" required></label>
          <label>Email<input name="email" type="email" autocomplete="email" required></label>
          <label>Mot de passe<input name="password" type="password" minlength="8" autocomplete="new-password" required></label>
          <button class="primary-button" type="submit">Créer le compte</button>
        </form>

        <form id="confirm-form" class="auth-form" data-panel="confirm" hidden>
          <label>Nom d’utilisateur<input name="username" autocomplete="username" required></label>
          <label>Code reçu par email<input name="code" inputmode="numeric" autocomplete="one-time-code" required></label>
          <button class="primary-button" type="submit">Confirmer</button>
        </form>
      </div>
      <p id="auth-message" class="modal-message" aria-live="polite"></p>
    </dialog>

    <dialog id="leaderboard-dialog" class="modal leaderboard-modal">
      <div class="modal-header">
        <div>
          <p class="overline">Top 10</p>
          <h2>Classement</h2>
        </div>
        <div class="modal-actions">
          <button id="refresh-button" class="icon-button" type="button" aria-label="Actualiser le classement">↻</button>
          <button class="close-button" type="button" data-close-dialog aria-label="Fermer">×</button>
        </div>
      </div>
      <p id="personal-score" class="personal-score">Votre record : —</p>
      <ol id="leaderboard" class="leaderboard-list">
        <li class="empty-row">Connectez-vous pour afficher les scores.</li>
      </ol>
      <p id="api-message" class="modal-message" aria-live="polite"></p>
    </dialog>
  </body>
</html>
